version: '3.8'

services:
  askelira:
    build: .
    ports:
      - "3000:3000"
      - "5678:5678"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - LOG_TO_FILE=true
    volumes:
      - askelira-memory:/root/.askelira/memory
      - askelira-logs:/root/.askelira/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  askelira-memory:
  askelira-logs:
